name: forma

services:
  forma:
    build: .
    container_name: forma
    ports:
      - "3001:3000"
    volumes:
      - /DATA/AppData/forma:/data
    environment:
      - DATABASE_URL=file:/data/forma.db
    restart: unless-stopped
    networks:
      - forma_net

networks:
  forma_net:
    driver: bridge

# ── CasaOS app metadata — makes Forma show as a native app (not "legacy"). ──
# Swap `icon` for your own (a URL, or drop a PNG in /DATA/AppData/forma and use
# a file path). port_map must match the published host port above.
x-casaos:
  architectures:
    - amd64
    - arm64
  main: forma
  author: Antonio Rios
  developer: Antonio Rios
  category: Health
  title:
    en_us: Forma
  tagline:
    en_us: Personal training tracker
  description:
    en_us: >-
      Forma — import Strong workout exports, track history, manage an exercise
      library with muscle targeting, plan weekly routines, and chart progress.
  icon: https://raw.githubusercontent.com/walkxcode/dashboard-icons/main/png/dumbbell.png
  port_map: "3001"
  scheme: http
  index: /
  webui_port: 3001
